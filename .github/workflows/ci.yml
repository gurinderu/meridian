name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: build · test · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --all-targets

      # The default suite is hermetic. The live end-to-end tests are `#[ignore]`
      # (they need an authenticated `claude` CLI) and are skipped here.
      - name: Test
        run: cargo test --workspace

      - name: Clippy (-D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # NOTE: deliberately NO `cargo fmt --check`. This repo does not use
      # rustfmt — it follows a dense hand style, and `main` itself does not
      # match rustfmt's defaults. Adding a fmt gate would fail every run.

  release:
    name: release binary
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --bin meridian
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: meridian-linux-x86_64
          path: target/release/meridian
          if-no-files-found: error
